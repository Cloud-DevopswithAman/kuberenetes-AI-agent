version: '3.9'

services:
  backend:
    # This helper compose file mounts the host kubeconfig into the backend container.
    # Usage: set KUBECONFIG_PATH in `.env`, then run:
    # docker compose -f docker-compose.yml -f docker-compose.kubeconfig.yml up --build
    volumes:
      - ${KUBECONFIG_PATH}:/root/.kube/config:ro
