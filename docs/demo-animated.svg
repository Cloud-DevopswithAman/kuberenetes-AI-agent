<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
  <style>
    .bg { fill: #0f172a; }
    .card { fill: #0b1220; stroke: #1f2937; stroke-width: 2; rx: 12; }
    .title { fill: #e6eef8; font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 700; }
    .step { fill: #94a3b8; font-family: Inter, Arial, sans-serif; font-size: 13px; }
    .dot { fill: #06b6d4; }
  </style>
  <rect class="bg" width="800" height="240" />
  <rect class="card" x="20" y="20" width="760" height="200" rx="16" />
  <text x="40" y="52" class="title">Investigation demo — selecting cluster, scanning, and diagnosis</text>

  <g transform="translate(80,88)">
    <text x="0" y="0" class="step">Context selected</text>
    <circle class="dot" cx="-16" cy="-4" r="6">
      <animate attributeName="cx" values="-16;0;16;-16" dur="2.4s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#06b6d4;#60a5fa;#34d399;#06b6d4" dur="2.4s" repeatCount="indefinite" />
    </circle>

    <text x="220" y="0" class="step">Checking pods</text>
    <circle class="dot" cx="200" cy="-4" r="6">
      <animate attributeName="cy" values="-4;6;-4" dur="1.6s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#06b6d4;#f59e0b;#06b6d4" dur="1.6s" repeatCount="indefinite" />
    </circle>

    <text x="420" y="0" class="step">Collecting logs</text>
    <circle class="dot" cx="400" cy="-4" r="6">
      <animate attributeName="r" values="6;10;6" dur="1.2s" repeatCount="indefinite" />
      <animate attributeName="fill" values="#06b6d4;#ef4444;#06b6d4" dur="1.2s" repeatCount="indefinite" />
    </circle>

    <text x="620" y="0" class="step">AI Reasoning</text>
    <rect x="588" y="-14" width="80" height="28" rx="6" fill="#063a5b">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite" />
    </rect>
  </g>

  <text x="40" y="200" class="step">This animated SVG serves as a lightweight demo for GitHub README and docs.</text>
</svg>
