version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: ai-kubernetes-backend
    ports:
      - '8000:8000'
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-gpt-4o-mini}
      KUBECONFIG_PATH: ${KUBECONFIG_PATH:-}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: ai-kubernetes-frontend
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped
